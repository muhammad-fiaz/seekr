<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  
  <!-- Magnifying glass handle -->
  <rect x="320" y="320" width="60" height="120" rx="12" fill="url(#grad2)" transform="rotate(-45 350 380)" filter="url(#shadow)"/>
  
  <!-- Magnifying glass lens -->
  <circle cx="220" cy="200" r="110" fill="none" stroke="white" stroke-width="24" filter="url(#shadow)"/>
  
  <!-- Lens shine -->
  <ellipse cx="185" cy="165" rx="35" ry="25" fill="white" opacity="0.3" transform="rotate(-30 185 165)"/>
  
  <!-- Document inside lens -->
  <rect x="175" y="150" width="70" height="90" rx="6" fill="white" opacity="0.95"/>
  
  <!-- Document lines -->
  <rect x="188" y="168" width="44" height="6" rx="2" fill="#3b82f6" opacity="0.8"/>
  <rect x="188" y="182" width="36" height="6" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="188" y="196" width="40" height="6" rx="2" fill="#3b82f6" opacity="0.7"/>
  <rect x="188" y="210" width="32" height="6" rx="2" fill="#3b82f6" opacity="0.5"/>
  
  <!-- Search sparkles -->
  <circle cx="340" cy="140" r="8" fill="white" opacity="0.8"/>
  <circle cx="370" cy="180" r="5" fill="white" opacity="0.6"/>
  <circle cx="350" cy="110" r="4" fill="white" opacity="0.5"/>
  
  <!-- Letter S stylized -->
  <path d="M 280 280 Q 300 260 320 270 Q 340 280 330 300 Q 320 320 300 310 Q 280 300 290 280 Z" fill="white" opacity="0.4"/>
</svg>
