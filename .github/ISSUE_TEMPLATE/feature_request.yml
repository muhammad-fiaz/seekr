name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe it clearly.
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: Describe your ideal solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Describe any alternatives you've thought about...

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the use case that this feature would address.
      placeholder: |
        When I use Seekr for [...], I need to [...] because [...]
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area does this feature relate to?
      options:
        - "Search functionality"
        - "Indexing"
        - "CLI"
        - "Library API"
        - "Performance"
        - "Configuration"
        - "Export/Import"
        - "File watching"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request here.
      placeholder: |
        - Mockups or diagrams
        - Similar features in other tools
        - Performance considerations
        - Implementation ideas

  - type: dropdown
    id: contribution-interest
    attributes:
      label: Contribution Interest
      description: Are you interested in contributing this feature?
      options:
        - "No, I just want to suggest the idea"
        - "Yes, I can help implement this feature"
        - "Maybe, I'd like to contribute but need guidance"
        - "Not sure yet"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched for similar features and couldn't find any
          required: true
        - label: I have checked that this feature doesn't already exist in Seekr
          required: true
        - label: I have included all relevant information above
          required: true
