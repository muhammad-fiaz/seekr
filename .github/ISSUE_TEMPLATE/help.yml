name: Help Request
description: Get help with using Seekr
title: "[HELP] "
labels: ["question", "help wanted"]
assignees: []
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with? Describe what you're trying to do and where you're stuck.
      placeholder: Tell us your question...
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What Have You Tried?
      description: Describe the steps you've already taken.
      placeholder: |
        1. I tried '...'
        2. I looked at '...'
        3. I read '...'

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does your question relate to?
      options:
        - "Installation"
        - "Configuration"
        - "Indexing"
        - "Search"
        - "CLI usage"
        - "Library API"
        - "Performance"
        - "Other"
    validations:
      required: true

  - type: input
    id: seekr-version
    attributes:
      label: Seekr Version
      description: What version of Seekr are you using?
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      placeholder: e.g., Windows 11, macOS 14.0, Ubuntu 22.04
    validations:
      required: true

  - type: textarea
    id: code-snippet
    attributes:
      label: Code Snippet (Optional but Recommended)
      description: |
        Provide any relevant code snippets that might help us understand your question.
      placeholder: |
        ```rust
        use seekr::core::SeekrApp;

        fn main() -> Result<(), Box<dyn std::error::Error>> {
            let app = SeekrApp::default_config()?;
            // Your code here
            Ok(())
        }
        ```
      render: rust
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or error messages here.
      placeholder: |
        - Error messages
        - Screenshots
        - Configuration files
        - Log output

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues and couldn't find an answer
          required: true
        - label: I have checked the documentation
          required: true
        - label: I have included all relevant information above
          required: true
