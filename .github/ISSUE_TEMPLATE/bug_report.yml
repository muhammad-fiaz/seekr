name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the issue.
      placeholder: |
        1. Run '...'
        2. Run '...'
        3. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: A clear description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: A clear description of what actually happened.
    validations:
      required: true

  - type: input
    id: seekr-version
    attributes:
      label: Seekr Version
      description: What version of Seekr are you using?
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: What Rust version are you using?
      placeholder: e.g., 1.85.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      placeholder: e.g., Windows 11, macOS 14.0, Ubuntu 22.04
    validations:
      required: true

  - type: dropdown
    id: installation-method
    attributes:
      label: Installation Method
      description: How did you install Seekr?
      options:
        - "From source (cargo install)"
        - "Prebuilt binary"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: |
        - Error messages
        - Screenshots
        - Configuration code
        - Sample code that reproduces the issue
        - Performance impact
        - Workarounds you've tried

  - type: textarea
    id: code-snippet
    attributes:
      label: Code Snippet (Optional but Recommended)
      description: |
        Provide a minimal code snippet that reproduces the issue.
        This helps us understand the problem faster.
      placeholder: |
        ```rust
        use seekr::core::SeekrApp;
        use seekr::types::SearchQuery;

        fn main() -> Result<(), Box<dyn std::error::Error>> {
            let app = SeekrApp::default_config()?;
            // Your code that reproduces the bug
            Ok(())
        }
        ```
      render: rust
    validations:
      required: false

  - type: dropdown
    id: solution-interest
    attributes:
      label: Solution Interest
      description: Are you interested in providing a solution for this bug?
      options:
        - "No, I just want to report the issue"
        - "Yes, I can help fix this bug"
        - "Maybe, I'd like to contribute but need guidance"
        - "Not sure yet"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched for similar issues and couldn't find any
          required: true
        - label: I have tried the latest version of Seekr
          required: true
        - label: I have included all relevant information above
          required: true
